<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sportovní Tipovačka</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

h1{
margin-top:10px;
}

.match{
background:#1e293b;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:500px;
}

.match h2{
margin:5px 0 10px 0;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
margin:5px;
font-size:14px;
}

button:hover{
background:#2563eb;
}

.admin{
background:#111827;
padding:20px;
margin-top:40px;
display:none;
border-radius:10px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:10px;
width:95%;
max-width:900px;
}

td,th{
border:1px solid gray;
padding:6px 8px;
font-size:14px;
}

.tableWrap{
overflow-x:auto;
}

@media (max-width:600px){

.match{
padding:15px;
}

button{
width:90%;
margin-top:8px;
}

td,th{
font-size:12px;
padding:5px;
}

}

</style>

<!-- knihovna na hash -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
authDomain: "tipovacka-fce0e.firebaseapp.com",
databaseURL: "https://tipovacka-fce0e-default-rtdb.firebaseio.com",
projectId: "tipovacka-fce0e",
storageBucket: "tipovacka-fce0e.firebasestorage.app",
messagingSenderId: "165273430060",
appId: "1:165273430060:web:a6a6ba6952152855230989"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* HASH hesla Acsparta333 */
const ADMIN_HASH="5ab4d8e6b5f9a7c4c6a52b6c3c43c2d4";

let matches=[];
let tips={};
let points={};

let playerId = localStorage.getItem("playerId");
if(!playerId){
playerId = "player_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("playerId",playerId);
}

let playerName = localStorage.getItem("playerName");

window.login=function(){

let pass=prompt("Admin heslo");

if(md5(pass)===ADMIN_HASH){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Špatné heslo");
}

}

window.logout=function(){
document.getElementById("adminPanel").style.display="none";
}

onValue(ref(db,"matches"),snap=>{

let data = snap.val() || [];

if(Array.isArray(data)){
matches = data;
}else{
matches = Object.values(data);
}

render();

})

onValue(ref(db,"tips"),snap=>{
tips=snap.val()||{};
render();
})

onValue(ref(db,"points"),snap=>{
points=snap.val()||{};
render();
})

function saveMatches(){
set(ref(db,"matches"),matches);
}

function saveTips(){
set(ref(db,"tips"),tips);
}

function savePoints(){
set(ref(db,"points"),points);
}

function render(){

let mdiv=document.getElementById("matches");
if(!mdiv) return;

mdiv.innerHTML="";

matches.forEach((m,i)=>{

let div=document.createElement("div");
div.className="match";

div.innerHTML=`

<h2>${m.home} vs ${m.away}</h2>

<p>${m.date||""}</p>

<button onclick="tip(${i})" ${m.closed?"disabled":""}>Tipovat skóre</button>

<p>Výsledek: ${m.result||"-"}</p>

`;

mdiv.appendChild(div);

});

renderTable();
renderAdmin();

}

window.tip=function(id){

if(!playerName){
playerName=prompt("Tvoje jméno");
localStorage.setItem("playerName",playerName);
}

let score=prompt("Zadej skóre (např 3:2)");

if(!score) return;

if(!tips[playerId]) tips[playerId]={name:playerName,tips:{}};

tips[playerId].tips[id]=score;

saveTips();

}

function renderTable(){

let table=document.getElementById("playersTable");

let html="<tr><th>Hráč</th><th>Body</th>";

matches.forEach(m=>{
html+=`<th>${m.home}-${m.away}</th>`;
});

html+="</tr>";

for(let id in tips){

html+=`<tr>
<td>${tips[id].name}</td>
<td>${points[id]||0}</td>`;

matches.forEach((m,i)=>{

let t=tips[id].tips?.[i]||"-";

html+=`<td>${t}</td>`;

});

html+="</tr>";

}

table.innerHTML=html;

}

function renderAdmin(){

let div=document.getElementById("adminMatches");
if(!div) return;

div.innerHTML="";

matches.forEach((m,i)=>{

let d=document.createElement("div");

d.innerHTML=`

<hr>

<input value="${m.home}" onchange="changeTeam(${i},this.value,'home')">
<input value="${m.away}" onchange="changeTeam(${i},this.value,'away')">

<br>

<input type="datetime-local" value="${m.date||""}" onchange="changeDate(${i},this.value)">

<br>

<button onclick="toggle(${i})">
${m.closed?"Otevřít tipování":"Zavřít tipování"}
</button>

<button onclick="setResult(${i})">Uložit výsledek</button>

<button onclick="deleteMatch(${i})">Smazat zápas</button>

`;

div.appendChild(d);

});

}

window.changeTeam=function(id,val,type){

if(matches[id].closed){

matches[id][type]=val;
saveMatches();

}else{

alert("Nejdřív zavři tipování");

}

}

window.changeDate=function(id,val){

matches[id].date=val;
saveMatches();

}

window.toggle=function(id){

matches[id].closed=!matches[id].closed;
saveMatches();

}

window.setResult=function(id){

if(!matches[id].closed){
alert("Nejdřív zavři tipování");
return;
}

let r=prompt("Výsledek (např 3:2)");

matches[id].result=r;

calculatePoints(id);

saveMatches();
savePoints();

}

function calculatePoints(id){

let real=matches[id].result.split(":");

let rh=parseInt(real[0]);
let ra=parseInt(real[1]);

for(let p in tips){

let t=tips[p].tips?.[id];
if(!t) continue;

let tip=t.split(":");

let th=parseInt(tip[0]);
let ta=parseInt(tip[1]);

if(th===rh && ta===ra){

points[p]=(points[p]||0)+3;

}else{

let rw=rh>ra?"home":"away";
let tw=th>ta?"home":"away";

if(rw===tw){

points[p]=(points[p]||0)+1;

}

}

}

}

window.deleteMatch=function(id){

matches.splice(id,1);
saveMatches();

}

window.addMatch=function(){

matches.push({
home:"Tým 1",
away:"Tým 2",
date:"",
result:"-",
closed:false
});

saveMatches();

}

window.resetTips=function(){

tips={};
matches.forEach(m=>m.result="-");

saveTips();

}

window.resetPoints=function(){

points={};

savePoints();

}

</script>
</head>

<body>

<h1>🏒 Tipovačka</h1>

<button onclick="login()">Admin přihlášení</button>

<div id="matches"></div>

<h2>Tabulka hráčů</h2>

<div class="tableWrap">
<table id="playersTable"></table>
</div>

<div class="admin" id="adminPanel">

<h2>Admin panel</h2>

<button onclick="logout()">Odhlásit admina</button>

<br><br>

<button onclick="resetTips()">Resetovat tipy</button>
<button onclick="resetPoints()">Resetovat body</button>
<button onclick="addMatch()">Přidat zápas</button>

<div id="adminMatches"></div>

</div>

</body>
</html>
