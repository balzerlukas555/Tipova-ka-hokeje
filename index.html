<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        #intro.hidden { opacity: 0; pointer-events: none; }
        .logo-intro { width: 120px; }

        #authContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9998; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; border: 1px solid #3b82f6; }

        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        .wallet-card { background: #1e294b; border: 2px solid #3b82f6; border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 400px; }
        .balance-val { font-size: 24px; color: #6ee7b7; font-weight: bold; }
        .name-tag { font-size: 14px; color: #94a3b8; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; gap: 10px; }

        .group-container { margin: 20px auto; max-width: 500px; text-align: left; }
        .group-header { background: #1e293b; border-left: 4px solid #3b82f6; padding: 12px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; border-radius: 4px; }
        .group-header.finished { border-left-color: #475569; color: #94a3b8; }
        .group-content.collapsed { display: none; }

        .match { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .teams { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .live-score { background: #991b1b; padding: 2px 8px; border-radius: 4px; }

        table { width: 100%; background: #1e293b; border-radius: 10px; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
        .my-row { background: #1e294b; border: 1px solid #3b82f6; }

        .admin { background: #111827; padding: 15px; display: none; border-radius: 12px; max-width: 800px; margin: 20px auto; border: 2px dashed #ef4444; text-align: left; }
        .admin-section { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input, select { padding: 8px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin: 2px; }
        .btn-danger { background: #991b1b; } .btn-success { background: #059669; } .btn-gold { background: #d97706; } .btn-alt { background: #475569; }
    </style>
</head>
<body>

    <div id="intro"><img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-intro"></div>

    <div id="authContainer">
        <div class="auth-box" id="loginForm">
            <h2>Přihlášení</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Heslo">
            <button onclick="window.handleLogin()" style="width:100%">Vstoupit</button>
            <p onclick="window.toggleAuth(true)" style="cursor:pointer; color:#3b82f6; font-size:12px">Registrovat se</p>
        </div>
        <div class="auth-box" id="regForm" style="display:none">
            <h2>Registrace</h2>
            <input type="text" id="regName" placeholder="Tvé jméno">
            <input type="email" id="regEmail" placeholder="E-mail">
            <input type="password" id="regPass" placeholder="Heslo">
            <button onclick="window.handleRegister()" class="btn-success" style="width:100%">Vytvořit účet</button>
            <p onclick="window.toggleAuth(false)" style="cursor:pointer; color:#3b82f6; font-size:12px">Zpět na přihlášení</p>
        </div>
    </div>

    <div id="appUI" style="display:none">
        <h1>Tipovačka</h1>
        <div class="wallet-card">
            <div class="name-tag"><span id="displayName">...</span> <button class="btn-alt btn-small" onclick="window.changeMyName()">Změnit jméno</button> <button class="btn-danger btn-small" onclick="window.logout()">Odhlásit</button></div>
            <div class="balance-val"><span id="myBalance">0</span> TC</div>
        </div>

        <div id="matchesContainer"></div>
        <h2>Žebříček sázkařů</h2>
        <table id="playersTable"></table>

        <div id="adminPanel" class="admin">
            <div class="admin-section">
                <h3>Skupiny</h3>
                <input id="newGroupName"><button onclick="window.addGroup()" class="btn-success">Přidat skupinu</button>
                <div id="adminGroupsList"></div>
            </div>
            <div class="admin-section">
                <h3>Zápasy</h3>
                <button onclick="window.addMatch()" class="btn-success" style="width:100%">+ Nový zápas</button>
                <div id="adminMatchesList"></div>
            </div>
            <div class="admin-section">
                <h3>Hráči</h3>
                <div id="adminPlayersList"></div>
            </div>
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-alt" style="width:100%">Zavřít</button>
        </div>
        <button onclick="window.adminLogin()" class="btn-alt" style="margin-top:20px">Admin</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE", authDomain: "tipovacka-fce0e.firebaseapp.com", databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "tipovacka-fce0e" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let state = { matches: {}, groups: {}, players: {}, user: null };

    window.toggleAuth = (s) => { document.getElementById('loginForm').style.display = s ? 'none' : 'block'; document.getElementById('regForm').style.display = s ? 'block' : 'none'; };
    window.handleRegister = () => {
        const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
        createUserWithEmailAndPassword(auth, e, p).then(u => set(ref(db, `tips/${u.user.uid}`), { name: n, balance: 2500 })).catch(a => alert(a.message));
    };
    window.handleLogin = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(a => alert(a.message)); };
    window.logout = () => signOut(auth);
    window.changeMyName = () => { const n = prompt("Nové jméno:"); if(n) update(ref(db, `tips/${state.user.uid}`), { name: n }); };

    onAuthStateChanged(auth, u => {
        state.user = u;
        document.getElementById('authContainer').style.display = u ? 'none' : 'flex';
        document.getElementById('appUI').style.display = u ? 'block' : 'none';
    });

    window.adminLogin = () => { if(prompt("Heslo:") === "Acsparta333") document.getElementById("adminPanel").style.display = "block"; };
    window.addGroup = () => { const n = document.getElementById("newGroupName").value; if(n) set(ref(db, `groups/g${Date.now()}`), { name: n, order: Date.now() }); };
    window.deleteGroup = (id) => { if(confirm("Smazat?")) remove(ref(db, `groups/${id}`)); };
    window.addMatch = () => { set(ref(db, `matches/m${Date.now()}`), { home:"Tým A", away:"Tým B", date:"1.1. 18:00", group:"none", status:"Plánováno", score:"0:0", closed:false }); };
    window.updateMatch = (id, f, v) => update(ref(db, `matches/${id}`), { [f]: v });
    window.deleteMatch = (id) => { if(confirm("Smazat?")) remove(ref(db, `matches/${id}`)); };
    window.adjustPlayerBalance = (id) => { const v = prompt("+/- TC:"); if(v) update(ref(db, `tips/${id}`), { balance: (state.players[id].balance || 0) + parseInt(v) }); };
    window.resetPlayer = (id) => { if(confirm("Resetovat hráče?")) update(ref(db, `tips/${id}`), { balance: 2500, bets: null }); };
    window.deletePlayer = (id) => { if(confirm("Smazat?")) remove(ref(db, `tips/${id}`)); };

    window.evaluateMatch = (mId) => {
        const m = state.matches[mId]; if(m.status !== "Konec") return alert("Musí být stav Konec!");
        Object.keys(state.players).forEach(pId => {
            const b = state.players[pId]?.bets?.[mId]; if(!b) return;
            let mult = 0; const [hS, aS] = m.score.split(":").map(Number), [bH, bA] = b.tip.split(":").map(Number);
            let w = hS > aS ? "1" : (aS > hS ? "2" : "0"), bW = bH > bA ? "1" : (bA > bH ? "2" : "0");
            if(b.tip === m.score) mult = 3; else if(w === bW) mult = 2;
            if(mult > 0) update(ref(db, `tips/${pId}`), { balance: (state.players[pId].balance || 0) + (b.stake * mult) });
            remove(ref(db, `tips/${pId}/bets/${mId}`));
        });
        update(ref(db, `matches/${mId}`), { status: "Dohráno", closed: true });
    };

    window.placeBet = (mId) => {
        const m = state.matches[mId], p = state.players[state.user.uid]; if(m.closed) return;
        const tip = prompt("Tip (3:2):"); if(!tip || !tip.includes(":")) return;
        const stake = parseInt(prompt(`Vklad (max ${p.balance}):`)); if(isNaN(stake) || stake <= 0 || stake > p.balance) return;
        update(ref(db, `tips/${state.user.uid}`), { balance: p.balance - stake });
        set(ref(db, `tips/${state.user.uid}/bets/${mId}`), { tip, stake });
    };

    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {}; state.matches = d.matches || {}; state.groups = d.groups || {}; state.players = d.tips || {};
        renderAdmin(); renderMain();
    });

    function renderAdmin() {
        const gL = document.getElementById("adminGroupsList"); gL.innerHTML = "";
        Object.keys(state.groups).forEach(id => { gL.innerHTML += `<div>${state.groups[id].name} <button onclick="window.deleteGroup('${id}')" class="btn-danger btn-small">X</button></div>`; });
        const mL = document.getElementById("adminMatchesList"); mL.innerHTML = "";
        Object.keys(state.matches).sort().reverse().forEach(id => {
            const m = state.matches[id]; let gO = `<option value="none">Bez skupiny</option>`;
            Object.keys(state.groups).forEach(gid => { gO += `<option value="${gid}" ${m.group===gid?'selected':''}>${state.groups[gid].name}</option>`; });
            mL.innerHTML += `<div class="admin-section">
                <input onchange="window.updateMatch('${id}','home',this.value)" value="${m.home}"> <input onchange="window.updateMatch('${id}','away',this.value)" value="${m.away}">
                <select onchange="window.updateMatch('${id}','group',this.value)">${gO}</select>
                <div style="display:flex"><select onchange="window.updateMatch('${id}','status',this.value)"><option value="Plánováno" ${m.status==='Plánováno'?'selected':''}>Plánováno</option><option value="1. Třetina" ${m.status==='1. Třetina'?'selected':''}>1. Třetina</option><option value="Konec" ${m.status==='Konec'?'selected':''}>Konec</option><option value="Dohráno" ${m.status==='Dohráno'?'selected':''}>Dohráno</option></select>
                <input onchange="window.updateMatch('${id}','score',this.value)" value="${m.score}" style="width:60px"></div>
                <button onclick="window.updateMatch('${id}','status','1. Třetina')" class="btn-success">Start zápasu</button>
                <button onclick="window.evaluateMatch('${id}')" class="btn-gold">Vyhodnotit</button>
                <button onclick="window.updateMatch('${id}','closed',${!m.closed})" class="btn-alt">${m.closed?'Otevřít':'Zavřít'}</button>
                <button onclick="window.deleteMatch('${id}')" class="btn-danger">X</button></div>`;
        });
        const pL = document.getElementById("adminPlayersList"); pL.innerHTML = "";
        Object.keys(state.players).forEach(id => { const p = state.players[id]; pL.innerHTML += `<div>${p.name} (${p.balance}) <button onclick="window.adjustPlayerBalance('${id}')">+/-</button><button onclick="window.resetPlayer('${id}')" class="btn-gold">Reset</button><button onclick="window.deletePlayer('${id}')" class="btn-danger">X</button></div>`; });
    }

    function renderMain() {
        if(!state.user || !state.players[state.user.uid]) return;
        const curP = state.players[state.user.uid];
        document.getElementById("myBalance").innerText = curP.balance;
        document.getElementById("displayName").innerText = curP.name;
        const cont = document.getElementById("matchesContainer"); cont.innerHTML = "";
        const sG = Object.keys(state.groups).sort((a,b) => state.groups[a].order - state.groups[b].order);
        [...sG, "none"].forEach(gId => {
            const gM = Object.keys(state.matches).filter(mid => state.matches[mid].group === gId);
            if(gM.length === 0) return;
            let gH = `<div class="group-container"><div class="group-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">${gId==="none"?"Ostatní":state.groups[gId].name} <span>▼</span></div><div class="group-content collapsed">`;
            gM.forEach(mId => {
                const m = state.matches[mId], b = curP.bets?.[mId];
                gH += `<div class="match"><div>${m.date} | ${m.status}</div><div class="teams">${m.home} ${m.status!=='Plánováno'?`<span class="live-score">${m.score}</span>`:'vs'} ${m.away}</div>
                    ${b ? `<div style="color:#6ee7b7">Tvůj tip: ${b.tip} (${b.stake} TC)</div>` : `<button onclick="window.placeBet('${mId}')" ${m.closed?'disabled':''}>Vsadit</button>`}</div>`;
            });
            cont.innerHTML += gH + "</div></div>";
        });
        const table = document.getElementById("playersTable");
        let ps = Object.keys(state.players).sort((a,b) => state.players[b].balance - state.players[a].balance);
        let tH = `<tr><th>#</th><th>Hráč</th><th>TC</th></tr>`;
        ps.forEach((pid, idx) => { const p = state.players[pid]; tH += `<tr class="${pid===state.user.uid?'my-row':''}"><td>${idx+1}.</td><td>${p.name}</td><td>${p.balance}</td></tr>`; });
        table.innerHTML = tH;
    }
    window.addEventListener('load', () => setTimeout(() => document.getElementById('intro').classList.add('hidden'), 1000));
</script>
</body>
</html>
