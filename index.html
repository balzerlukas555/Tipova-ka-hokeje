<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hokejová Tipovačka</title>
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;}
        .match{background:#1e293b;padding:20px;margin:15px auto;border-radius:12px;max-width:500px;border: 1px solid #334155;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;margin:5px;}
        button:hover{background:#2563eb;}
        .admin{background:#111827;padding:20px;display:none;border-radius:10px;max-width:700px;margin:40px auto;border: 2px dashed #ef4444;}
        input{padding:8px;border-radius:6px;margin:5px;background: #1e293b; color: white; border: 1px solid #475569;}
        table{margin:20px auto;border-collapse:collapse;width:95%;background: #1e293b;}
        td,th{border:1px solid #334155;padding:10px;}
    </style>
</head>
<body>

    <h1>🏒 Hokejová Tipovačka</h1>
    <button onclick="adminLogin()">Admin přihlášení</button>

    <div id="matches">Načítám zápasy...</div>

    <h2>Tabulka</h2>
    <div style="overflow-x:auto;"><table id="playersTable"></table></div>

    <div class="admin" id="adminPanel">
        <h2>Admin panel</h2>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:#ef4444">Zavřít</button>
        <button onclick="addMatch()">+ Přidat zápas</button>
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- NASTAVENÍ HESLA ---
    const MOJE_HESLO = "Acsparta333"; 

    window.adminLogin = function() {
        let p = prompt("Zadej heslo:");
        if (p === MOJE_HESLO) {
            document.getElementById("adminPanel").style.display = "block";
            renderAdmin();
        } else {
            alert("Spatne heslo!");
        }
    };

    let matches = [], tips = {}, points = {};
    let pId = localStorage.getItem("pId") || "p" + Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    // Načítání dat
    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        matches = d.matches || [];
        tips = d.tips || {};
        points = d.points || {};
        render();
    });

    function render() {
        const div = document.getElementById("matches");
        div.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            div.innerHTML += `
                <div class="match">
                    <h2>${m.home} vs ${m.away}</h2>
                    <button onclick="sendTip(${i})" ${m.closed ? 'disabled' : ''}>
                        ${m.closed ? 'Uzavřeno' : 'Tipovat'}
                    </button>
                    <p>Výsledek: <b>${m.result || "-:-"}</b></p>
                </div>`;
        });
        renderTable();
        if(document.getElementById("adminPanel").style.display === "block") renderAdmin();
    }

    window.sendTip = function(i) {
        let n = localStorage.getItem("pName") || prompt("Tvoje jméno:");
        if(!n) return;
        localStorage.setItem("pName", n);
        let t = prompt("Tvůj tip (např. 3:2):");
        if(t && t.includes(":")) {
            set(ref(db, `tips/${pId}/name`), n);
            set(ref(db, `tips/${pId}/tips/${i}`), t);
        }
    };

    function renderTable() {
        let h = "<tr><th>Hráč</th><th>Body</th></tr>";
        for (let id in tips) {
            h += `<tr><td>${tips[id].name}</td><td>${points[id] || 0}</td></tr>`;
        }
        document.getElementById("playersTable").innerHTML = h;
    }

    // ADMIN FUNKCE
    window.addMatch = function() {
        matches.push({home:"Tým A", away:"Tým B", closed:false, result:"-"});
        set(ref(db, "matches"), matches);
    };

    window.setRes = function(i) {
        let r = prompt("Výsledek (3:2):");
        if(r) {
            set(ref(db, `matches/${i}/result`), r);
            set(ref(db, `matches/${i}/closed`), true);
            recalc();
        }
    };

    function renderAdmin() {
        let ad = document.getElementById("adminMatches");
        ad.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            ad.innerHTML += `
                <div style="border-bottom:1px solid #444; padding:10px;">
                    ${m.home} vs ${m.away} 
                    <button onclick="setRes(${i})">Zadat výsledek</button>
                    <button onclick="del(${i})" style="background:red">Smazat</button>
                </div>`;
        });
    }

    window.del = (i) => { matches.splice(i,1); set(ref(db, "matches"), matches); };

    function recalc() {
        let p = {};
        for (let id in tips) {
            let total = 0;
            matches.forEach((m, i) => {
                if(m.result !== "-" && tips[id].tips?.[i]) {
                    let [rh, ra] = m.result.split(":").map(Number);
                    let [th, ta] = tips[id].tips[i].split(":").map(Number);
                    if(rh===th && ra===ta) total += 3;
                    else if((rh>ra && th>ta) || (rh<ra && th<ta) || (rh===ra && th===ta)) total += 1;
                }
            });
            p[id] = total;
        }
        set(ref(db, "points"), p);
    }
</script>
</body>
</html>
