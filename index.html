<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hokejová Tipovačka</title>
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;}
        h1{margin-top:10px; color: #3b82f6;}
        .match{background:#1e293b;padding:20px;margin:15px auto;border-radius:12px;max-width:500px;border: 1px solid #334155;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;margin:5px;font-size:14px;}
        button:hover{background:#2563eb;}
        button:disabled{background:#475569; cursor: not-allowed;}
        .admin{background:#111827;padding:20px;margin-top:40px;display:none;border-radius:10px;max-width:700px;margin:40px auto;border: 2px dashed #ef4444;}
        input{padding:8px;border-radius:6px;border:1px solid #334155;margin:5px;background: #1e293b; color: white;}
        table{margin:20px auto;border-collapse:collapse;width:95%;max-width:900px;background: #1e293b;}
        td,th{border:1px solid #334155;padding:10px;font-size:14px;}
        th{background: #334155;}
        .tableWrap{overflow-x:auto;}
    </style>
</head>
<body>

    <h1>🏒 Hokejová Tipovačka</h1>
    <button id="loginBtn">Admin přihlášení</button>

    <div id="matches"></div>

    <h2>Průběžná tabulka</h2>
    <div class="tableWrap">
        <table id="playersTable"></table>
    </div>

    <div class="admin" id="adminPanel">
        <h2>Admin panel</h2>
        <button id="logoutBtn" style="background:#ef4444">Odhlásit se</button>
        <br><br>
        <button id="addMatchBtn">+ Přidat nový zápas</button>
        <button id="recalcBtn">🔄 Přepočítat body</button>
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ZAŠIFROVANÉ HESLO (SHA-256 pro "Acsparta333")
    const ADMIN_HASH = "81907085a676646535560965d1b7d566371c66289b703e7e96b7617300c7104d";

    let matches = [], tips = {}, points = {};
    let playerId = localStorage.getItem("playerId") || "p_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("playerId", playerId);
    let playerName = localStorage.getItem("playerName");

    // Funkce pro bezpečné ověření hesla bez externích knihoven
    async function checkPassword(input) {
        const msgUint8 = new TextEncoder().encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex === ADMIN_HASH;
    }

    document.getElementById("loginBtn").onclick = async () => {
        let pass = prompt("Zadej admin heslo:");
        if (await checkPassword(pass)) {
            document.getElementById("adminPanel").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("Špatné heslo!");
        }
    };

    document.getElementById("logoutBtn").onclick = () => document.getElementById("adminPanel").style.display = "none";

    // REALTIME DATA
    onValue(ref(db, "/"), snap => {
        const data = snap.val() || {};
        matches = data.matches || [];
        tips = data.tips || {};
        points = data.points || {};
        render();
    });

    function render() {
        const mdiv = document.getElementById("matches");
        mdiv.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            let div = document.createElement("div");
            div.className = "match";
            div.innerHTML = `
                <h2>${m.home} vs ${m.away}</h2>
                <p>📅 ${m.date ? m.date.replace("T", " ") : "---"}</p>
                <button id="tip-${i}" ${m.closed ? "disabled" : ""}>${m.closed ? "Zavřeno" : "Tipovat"}</button>
                <p><strong>Výsledek: ${m.result || "- : -"}</strong></p>
            `;
            mdiv.appendChild(div);
            if(!m.closed) document.getElementById(`tip-${i}`).onclick = () => sendTip(i);
        });
        renderTable();
        renderAdmin();
    }

    function renderTable() {
        let table = document.getElementById("playersTable");
        let html = "<tr><th>Hráč</th><th>Body</th>";
        matches.forEach(m => { if(m) html += `<th>${m.home.substring(0,3)}</th>`; });
        html += "</tr>";
        for (let id in tips) {
            html += `<tr><td>${tips[id].name}</td><td style="color:#fbbf24">${points[id] || 0}</td>`;
            matches.forEach((m, i) => { if(m) html += `<td>${tips[id].tips?.[i] || "-"}</td>`; });
            html += "</tr>";
        }
        table.innerHTML = html;
    }

    async function sendTip(id) {
        if (!playerName) {
            playerName = prompt("Tvoje jméno:");
            if (!playerName) return;
            localStorage.setItem("playerName", playerName);
        }
        let score = prompt("Tip (např. 3:2):");
        if (score && score.includes(":")) {
            set(ref(db, `tips/${playerId}/name`), playerName);
            set(ref(db, `tips/${playerId}/tips/${id}`), score);
        }
    }

    // ADMIN LOGIKA
    function renderAdmin() {
        let div = document.getElementById("adminMatches");
        div.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            let d = document.createElement("div");
            d.style.padding = "10px"; d.style.borderBottom = "1px solid #334155";
            d.innerHTML = `
                <input value="${m.home}" id="h-${i}"> vs <input value="${m.away}" id="a-${i}">
                <button id="save-${i}">Uložit názvy</button>
                <button id="tog-${i}">${m.closed ? "🔓" : "🔒"}</button>
                <button id="res-${i}" style="background:#10b981">Výsledek</button>
                <button id="del-${i}" style="background:#991b1b">Smazat</button>
            `;
            div.appendChild(d);
            document.getElementById(`save-${i}`).onclick = () => {
                set(ref(db, `matches/${i}/home`), document.getElementById(`h-${i}`).value);
                set(ref(db, `matches/${i}/away`), document.getElementById(`a-${i}`).value);
            };
            document.getElementById(`tog-${i}`).onclick = () => set(ref(db, `matches/${i}/closed`), !m.closed);
            document.getElementById(`del-${i}`).onclick = () => { matches.splice(i, 1); set(ref(db, "matches"), matches); };
            document.getElementById(`res-${i}`).onclick = () => {
                let r = prompt("Výsledek (např. 2:1):");
                if(r) { 
                    set(ref(db, `matches/${id}/result`), r);
                    set(ref(db, `matches/${id}/closed`), true);
                    recalcPoints();
                }
            };
        });
    }

    document.getElementById("addMatchBtn").onclick = () => {
        if(!matches) matches = [];
        matches.push({ home: "Tým A", away: "Tým B", result: "-", closed: false });
        set(ref(db, "matches"), matches);
    };

    function recalcPoints() {
        let newPoints = {};
        for (let pId in tips) {
            let total = 0;
            matches.forEach((m, i) => {
                if (m && m.result && m.result !== "-" && tips[pId].tips?.[i]) {
                    let [rh, ra] = m.result.split(":").map(Number);
                    let [th, ta] = tips[pId].tips[i].split(":").map(Number);
                    if (rh === th && ra === ta) total += 3;
                    else if ((rh > ra && th > ta) || (rh < ra && th < ta) || (rh === ra && th === ta)) total += 1;
                }
            });
            newPoints[pId] = total;
        }
        set(ref(db, "points"), newPoints);
    }
    document.getElementById("recalcBtn").onclick = recalcPoints;

</script>
</body>
</html>
