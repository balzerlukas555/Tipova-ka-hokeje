<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        /* ZACHOVÁNÍ STYLU */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        #intro.hidden { opacity: 0; visibility: hidden; }
        .logo-intro { width: 120px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }
        
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        h1 { color: #3b82f6; }
        
        /* ADMIN ROZŠÍŘENÍ */
        .admin { background: #111827; padding: 15px; display: none; border-radius: 12px; max-width: 800px; margin: 20px auto; border: 2px dashed #ef4444; }
        .admin-section { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .admin-item { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        
        input, select { padding: 8px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-danger { background: #991b1b; }
        .btn-success { background: #059669; }
        .btn-alt { background: #475569; }

        /* TABULKA A ZÁPASY (Stejný styl) */
        .match { background: #1e293b; padding: 15px; border-radius: 12px; margin: 10px auto; max-width: 450px; border: 1px solid #334155; }
        .group-header { background: #3b82f6; color: white; padding: 10px; border-radius: 8px; margin: 20px auto; max-width: 450px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="intro"><img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-intro"></div>

    <h1>Tipovačka</h1>
    
    <div id="userStats" style="margin-bottom: 15px; font-weight: bold; color: #6ee7b7;">
        Peněženka: <span id="myBalance">2000</span> Tip-coinů
    </div>

    <div id="matchesContainer">
        </div>

    <div id="adminPanel" class="admin">
        <h2>Admin Panel 2.0</h2>
        
        <div class="admin-section">
            <h3>1. Správa skupin</h3>
            <div style="display: flex; gap: 5px;">
                <input id="newGroupName" placeholder="Název skupiny (např. 1. kolo)">
                <button onclick="window.addGroup()" class="btn-success">Vytvořit</button>
            </div>
            <div id="adminGroupsList" style="margin-top: 10px;"></div>
        </div>

        <div class="admin-section">
            <h3>2. Správa zápasů</h3>
            <button onclick="window.addMatch()" class="btn-success" style="width:100%">+ Přidat nový zápas</button>
            <div id="adminMatchesList" style="margin-top: 10px;"></div>
        </div>

        <div class="admin-section">
            <h3>3. Moderace hráčů</h3>
            <div id="adminPlayersList"></div>
        </div>

        <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-alt" style="width: 100%">Zavřít Admin Panel</button>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="window.adminLogin()" class="btn-alt">Admin sekce</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let state = { matches: {}, groups: {}, players: {}, pId: localStorage.getItem("pId") || "p"+Math.random().toString(16).slice(2) };
    localStorage.setItem("pId", state.pId);

    // INTRO
    window.addEventListener('load', () => setTimeout(() => document.getElementById('intro').classList.add('hidden'), 1500));
    window.adminLogin = () => { if (prompt("Heslo:") === "Acsparta333") document.getElementById("adminPanel").style.display = "block"; };

    // --- LOGIKA SKUPIN ---
    window.addGroup = () => {
        const name = document.getElementById("newGroupName").value;
        if (!name) return;
        const id = "g" + Date.now();
        set(ref(db, `groups/${id}`), { name: name, order: Object.keys(state.groups).length, arch: false });
        document.getElementById("newGroupName").value = "";
    };
    window.deleteGroup = (id) => { if(confirm("Smazat skupinu? Zápasy zůstanou, ale nebudou mít kategorii.")) remove(ref(db, `groups/${id}`)); };

    // --- LOGIKA ZÁPASŮ ---
    window.addMatch = () => {
        const id = "m" + Date.now();
        set(ref(db, `matches/${id}`), { 
            home: "Tým A", away: "Tým B", group: "none", status: "Plánováno", 
            score: "0:0", result: "-", closed: false, date: "1.1. 18:00" 
        });
    };
    window.updateMatch = (id, field, val) => update(ref(db, `matches/${id}`), { [field]: val });
    window.deleteMatch = (id) => { if(confirm("Smazat zápas?")) remove(ref(db, `matches/${id}`)); };

    // --- LOGIKA HRÁČŮ ---
    window.modPlayerBalance = (id, amount) => {
        const current = state.players[id]?.balance || 2000;
        update(ref(db, `tips/${id}`), { balance: current + parseInt(amount) });
    };
    window.deletePlayer = (id) => { if(confirm("Smazat hráče kompletně?")) remove(ref(db, `tips/${id}`)); };

    // --- HLAVNÍ SYNCHRONIZACE ---
    onValue(ref(db, "/"), snap => {
        const data = snap.val() || {};
        state.matches = data.matches || {};
        state.groups = data.groups || {};
        state.players = data.tips || {};

        renderAdmin();
        renderMain();
    });

    function renderAdmin() {
        // Admin Skupiny
        const gList = document.getElementById("adminGroupsList");
        gList.innerHTML = "";
        Object.keys(state.groups).forEach(id => {
            gList.innerHTML += `<div class="admin-item" style="display:flex; justify-content:space-between;">
                <span>${state.groups[id].name}</span>
                <button onclick="window.deleteGroup('${id}')" class="btn-danger" style="padding:2px 8px;">Smazat</button>
            </div>`;
        });

        // Admin Zápasy
        const mList = document.getElementById("adminMatchesList");
        mList.innerHTML = "";
        Object.keys(state.matches).forEach(id => {
            const m = state.matches[id];
            let groupOptions = `<option value="none">Bez skupiny</option>`;
            Object.keys(state.groups).forEach(gid => {
                groupOptions += `<option value="${gid}" ${m.group === gid ? 'selected' : ''}>${state.groups[gid].name}</option>`;
            });

            mList.innerHTML += `<div class="admin-item">
                <input value="${m.home} - ${m.away}" disabled style="background:transparent; border:none; font-weight:bold;">
                <select onchange="window.updateMatch('${id}', 'group', this.value)">${groupOptions}</select>
                <div style="display:flex; gap:5px;">
                    <select onchange="window.updateMatch('${id}', 'status', this.value)">
                        <option value="Plánováno" ${m.status==="Plánováno"?'selected':''}>Plánováno</option>
                        <option value="T1" ${m.status==="T1"?'selected':''}>1. třetina</option>
                        <option value="Po T1" ${m.status==="Po T1"?'selected':''}>Po 1. třetině</option>
                        <option value="T2" ${m.status==="T2"?'selected':''}>2. třetina</option>
                        <option value="Po T2" ${m.status==="Po T2"?'selected':''}>Po 2. třetině</option>
                        <option value="T3" ${m.status==="T3"?'selected':''}>3. třetina</option>
                        <option value="Konec" ${m.status==="Konec"?'selected':''}>Konec</option>
                        <option value="Konec (PP)" ${m.status==="Konec (PP)"?'selected':''}>Konec PP</option>
                        <option value="Konec (SN)" ${m.status==="Konec (SN)"?'selected':''}>Konec SN</option>
                    </select>
                    <input style="width:80px" placeholder="Stav" onchange="window.updateMatch('${id}', 'score', this.value)" value="${m.score}">
                </div>
                <div style="margin-top:5px; display:flex; gap:5px;">
                    <button class="btn-alt" onclick="window.updateMatch('${id}', 'closed', ${!m.closed})">${m.closed?'Otevřít tipy':'Zavřít tipy'}</button>
                    <button class="btn-danger" onclick="window.deleteMatch('${id}')">Smazat</button>
                </div>
            </div>`;
        });

        // Admin Hráči
        const pList = document.getElementById("adminPlayersList");
        pList.innerHTML = "";
        Object.keys(state.players).forEach(id => {
            const p = state.players[id];
            pList.innerHTML += `<div class="admin-item">
                <b>${p.name || "Neznámý"}</b> (${p.balance || 2000} TC)
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button onclick="window.modPlayerBalance('${id}', prompt('Částka (+/-):'))">+/- Peníze</button>
                    <button onclick="window.modPlayerBalance('${id}', -${p.balance || 0} + 2000)">Reset</button>
                    <button class="btn-danger" onclick="window.deletePlayer('${id}')">Smazat</button>
                </div>
            </div>`;
        });
    }

    function renderMain() {
        // Tady bude logika pro zobrazení skupin lidem (přijde v dalším kroku)
        const myData = state.players[state.pId];
        document.getElementById("myBalance").innerText = myData?.balance || 2000;
        
        // Pokud má hráč 0, automaticky mu přidáme 100
        if (myData && myData.balance <= 0) {
            window.modPlayerBalance(state.pId, 100);
        }
    }

</script>
</body>
</html>
